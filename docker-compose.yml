services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pixlinks
      POSTGRES_USER: pixlinks
      POSTGRES_PASSWORD: pixlinks_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://pixlinks:pixlinks_dev@postgres:5432/pixlinks?sslmode=disable
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8080"
      ENV: development
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
