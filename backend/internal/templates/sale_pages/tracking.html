{{define "tracking"}}
<script>
(function() {
    var ctaEventName = '{{.Tracking.CTAEventName}}' || 'Lead';
    var contentName = '{{.Tracking.ContentName}}' || document.title;
    var contentValue = {{.Tracking.ContentValue}};
    var currency = '{{.Tracking.Currency}}' || 'THB';

    function genId() {
        if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function getCookie(name) {
        var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : '';
    }

    function getParam(name) {
        var search = window.location.search.substring(1);
        var pairs = search.split('&');
        for (var i = 0; i < pairs.length; i++) {
            var pair = pairs[i].split('=');
            if (decodeURIComponent(pair[0]) === name) {
                return decodeURIComponent(pair[1] || '');
            }
        }
        return '';
    }

    function getUserData() {
        var ud = {};
        var fbpVal = getCookie('_fbp');
        var fbcVal = getCookie('_fbc');
        if (fbpVal) ud.fbp = fbpVal;
        if (fbcVal) {
            ud.fbc = fbcVal;
        } else {
            var fbclid = getParam('fbclid');
            if (fbclid) {
                ud.fbc = 'fb.1.' + Date.now() + '.' + fbclid;
            }
        }
        var em = getParam('em');
        var ph = getParam('ph');
        if (em) ud.em = em;
        if (ph) ud.ph = ph;
        if (fbpVal) {
            ud.external_id = fbpVal;
        } else {
            var eid = '';
            try { eid = localStorage.getItem('_px_eid') || ''; } catch(e) {}
            if (!eid) { eid = genId(); try { localStorage.setItem('_px_eid', eid); } catch(e) {} }
            ud.external_id = eid;
        }
        return ud;
    }

    function dualTrack(eventName, params) {
        var eid = genId();
        {{if and .APIKey (hasPixels .Pixels)}}
        var pixelIDs = [{{range $i, $p := .Pixels}}{{if $i}},{{end}}'{{$p.PixelID}}'{{end}}];
        var events = pixelIDs.map(function(pid) {
            return {
                pixel_id: pid,
                event_name: eventName,
                event_data: params || {},
                user_data: getUserData(),
                source_url: window.location.href,
                event_time: new Date().toISOString(),
                event_id: eid
            };
        });
        try {
            fetch('{{.BaseURL}}/api/v1/events/ingest', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': '{{.APIKey}}'
                },
                body: JSON.stringify({ events: events }),
                keepalive: true
            });
        } catch (e) {}
        {{end}}
    }

    function buildParams(extra) {
        var params = { content_name: contentName, content_category: 'sale_page' };
        if (contentValue > 0) {
            params.value = contentValue;
            params.currency = currency;
        }
        if (extra) {
            for (var k in extra) { params[k] = extra[k]; }
        }
        return params;
    }

    document.addEventListener('DOMContentLoaded', function() {
        dualTrack('ViewContent', buildParams());

        var ctaButtons = document.querySelectorAll('[data-track-cta]');
        ctaButtons.forEach(function(btn) {
            btn.addEventListener('click', function() {
                dualTrack(ctaEventName, buildParams());
            });
        });

        var contactLinks = document.querySelectorAll('[data-track-contact]');
        contactLinks.forEach(function(link) {
            link.addEventListener('click', function() {
                var contactType = this.getAttribute('data-track-contact');
                dualTrack('Contact', { content_name: contentName, content_category: contactType });
            });
        });
    });
})();
</script>
{{end}}
