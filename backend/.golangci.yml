version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - goconst
    - gosimple

  settings:
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - (io.Closer).Close
    goconst:
      min-len: 3
      min-occurrences: 3

  exclusions:
    generated: strict
    paths:
      - db/generated
