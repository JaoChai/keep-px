<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>การเชื่อมต่อหมดเวลา</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        p {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .retry {
            display: inline-block;
            padding: 0.625rem 1.5rem;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
        }
        .retry:hover { background: #2563eb; }
        .note { font-size: 0.75rem; color: #94a3b8; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#9202;</div>
        <h1>การเชื่อมต่อหมดเวลา</h1>
        <p>เซิร์ฟเวอร์ใช้เวลานานเกินไปในการตอบสนอง กรุณาลองใหม่อีกครั้ง</p>
        <a class="retry" href="javascript:location.reload()">ลองใหม่อีกครั้ง</a>
        <div class="note">หน้านี้จะรีเฟรชอัตโนมัติใน 30 วินาที</div>
    </div>
</body>
</html>
