name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      sdk: ${{ steps.filter.outputs.sdk }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            sdk:
              - 'sdk/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o /dev/null ./cmd/server

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  sdk:
    needs: changes
    if: needs.changes.outputs.sdk == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run build

  ci-gate:
    if: always()
    needs: [backend, frontend, sdk]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          results=("${{ needs.backend.result }}" "${{ needs.frontend.result }}" "${{ needs.sdk.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"

  deploy-verify:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-gate.result == 'success'
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deploy
        run: sleep 60

      - name: Verify backend health
        run: |
          URL="${{ vars.BACKEND_PROD_URL }}/health"
          echo "Checking backend at: $URL"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              BODY=$(curl -s --max-time 10 "$URL")
              echo "Backend is healthy: $BODY"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "Backend health check failed after 10 attempts"
          exit 1

      - name: Verify frontend
        run: |
          URL="${{ vars.FRONTEND_PROD_URL }}"
          if [ -z "$URL" ]; then
            echo "FRONTEND_PROD_URL not set, skipping"
            exit 0
          fi
          echo "Checking frontend at: $URL"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/5: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "Frontend health check failed after 5 attempts"
          exit 1
