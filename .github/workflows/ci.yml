name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -o /dev/null ./cmd/server

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: keeppx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://testuser:testpass@localhost:5432/keeppx_test?sslmode=disable
      JWT_SECRET: e2e-test-secret-key-for-ci
      PORT: 8080
      ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      FB_GRAPH_API_URL: https://graph.facebook.com/v21.0
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply database migrations
        working-directory: backend
        run: |
          for f in db/migrations/*.up.sql; do
            echo "Applying $f..."
            PGPASSWORD=testpass psql -h localhost -U testuser -d keeppx_test -f "$f"
          done

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7

  ci-gate:
    if: always()
    needs: [backend, frontend, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          results=("${{ needs.backend.result }}" "${{ needs.frontend.result }}" "${{ needs.e2e.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job failed with result: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"

  deploy-verify:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.ci-gate.result == 'success'
    needs: ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway deploy
        run: sleep 60

      - name: Verify backend health
        run: |
          URL="${{ vars.BACKEND_PROD_URL }}/health"
          echo "Checking backend at: $URL"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              BODY=$(curl -s --max-time 10 "$URL")
              echo "Backend is healthy: $BODY"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "Backend health check failed after 10 attempts"
          exit 1

      - name: Verify frontend
        run: |
          URL="${{ vars.FRONTEND_PROD_URL }}"
          if [ -z "$URL" ]; then
            echo "FRONTEND_PROD_URL not set, skipping"
            exit 0
          fi
          echo "Checking frontend at: $URL"
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$URL" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is serving (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/5: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "Frontend health check failed after 5 attempts"
          exit 1

  post-deploy-e2e:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy-verify.result == 'success'
    needs: deploy-verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests against production
        run: npx playwright test --grep @smoke
        env:
          E2E_BASE_URL: ${{ vars.FRONTEND_PROD_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_PROD_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_PROD_USER_PASSWORD }}

      - name: Upload smoke test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
